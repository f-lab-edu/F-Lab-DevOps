apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/metrics-server
    chart: metrics-server
    targetRevision: 3.12.x   # 최신 안정 버전 확인: https://artifacthub.io/packages/helm/metrics-server/metrics-server
    helm:
      values: |
        args:
          - --kubelet-insecure-tls   # EKS 환경에서 kubelet TLS 검증 우회 (필수)
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 100m
            memory: 200Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
