apiVersion: v1
kind: Secret
metadata:
  # Deployment 에서 참조하는 이름과 동일해야 합니다.
  # (현재 `deployment.yaml` 에서는 `app-secret` 으로 사용 중)
  name: app-secret
type: Opaque
data:
  # DATABASE_URL 은 "postgresql://USER:PASSWORD@HOST:PORT/DB_NAME" 문자열을
  # base64 로 인코딩한 값을 넣어야 합니다.
  #
  # 예시 원문 (직접 사용 금지, 각자 환경에 맞게 수정):
  #   postgresql://postgres:your-password@postgres-svc:5432/tempdb
  #
  # Linux / macOS:
  #   echo -n "postgresql://postgres:your-password@postgres-svc:5432/tempdb" | base64
  #
  # Windows PowerShell:
  #   $text = "postgresql://postgres:your-password@postgres-svc:5432/tempdb"
  #   $bytes = [System.Text.Encoding]::UTF8.GetBytes($text)
  #   [Convert]::ToBase64String($bytes)
  #
  # 위에서 얻은 base64 결과를 아래 값 자리에 넣어 사용하세요.
  DATABASE_URL: BASE64_ENCODED_DATABASE_URL_HERE

