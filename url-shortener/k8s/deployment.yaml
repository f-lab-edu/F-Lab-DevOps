apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
  labels:
    app: url-shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-shortener
  template:
    metadata:
      labels:
        app: url-shortener
    spec:
      containers:
        - name: url-shortener
          image: url-shortener-api:v1
          imagePullPolicy: Never # 외부 레지스트리에서 받지 않고 로컬 이미지 사용
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret    # Secret 이름
                  key: DATABASE_URL   # Secret 안의 키
            - name: APP_ENV
              value: production
            - name: DEBUG
              value: 'false'
          readinessProbe: # 컨테이너가 준비되었는지 확인하는 프로브: 실패시 서비스 트래픽을 받지 않음(Pod는 유지)
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe: # Pod가 살아있는지 확인하는 프로브: 실패시 Pod 재시작
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
