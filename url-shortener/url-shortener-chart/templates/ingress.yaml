{{- if .Values.ingress.enabled }} # values.yaml에서 ingress.enabled가 true일 때만 이 리소스를 생성
                                  # dev 환경에서 Ingress 없이 port-forward로 테스트하는 경우에 좋음
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  {{- with .Values.ingress.annotations }} # values.yaml에 값이 존재한다면 아래를 실행
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- else }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: / # ingress-nginx가 요청 경로를 백엔드 서비스로 보내기 전에 다른 값으로 변경하여 전달하도록 하는 annotation
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    {{- if .Values.ingress.host }} # ALB DNS를 사용하는 경우 아래 hosts는 필요 없으니 생략하도록 구현함
    - host: {{ .Values.ingress.host | quote }} # 특정 도메인으로 들어오는 요청만 처리
      http:
        paths:
          - path: /
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .Release.Name }}-svc
                port:
                  number: 80
    {{- else }}
    - http:
        paths:
          - path: /
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .Release.Name }}-svc
                port:
                  number: 80
    {{- end }}
{{- end }}
