# 기존 k8s/db/secret.yaml 변환 (기존 Secret 이름: app-secret → {{ .Release.Name }}-secret 으로 변경)
# password가 없으면 Secret을 생성하지 않음 (외부에서 직접 생성)
{{- if .Values.postgres.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
type: Opaque
data:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | b64enc }}
  DATABASE_URL: {{ .Values.postgres.databaseUrl | b64enc }}
{{- end }}