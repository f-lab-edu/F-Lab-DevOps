# 기존 k8s/db/secret.yaml 변환 (기존 Secret 이름: app-secret → {{ .Release.Name }}-secret 으로 변경)
# password가 없으면 Secret을 생성하지 않음 (외부에서 직접 생성)
{{- if or .Values.postgres.password .Values.rds.writeUrl }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
type: Opaque
data:
  {{- if .Values.postgres.enabled }}
  # StatefulSet PostgreSQL 사용 시
  POSTGRES_PASSWORD: {{ .Values.postgres.password | b64enc }}
  DATABASE_URL: {{ .Values.postgres.databaseUrl | b64enc }}
  DATABASE_READ_URL: {{ .Values.postgres.databaseUrl | b64enc }}  # dev: 동일 DB 사용
  {{- else }}
  # RDS 사용 시 (prod)
  DATABASE_URL: {{ .Values.rds.writeUrl | b64enc }}
  DATABASE_READ_URL: {{ .Values.rds.readUrl | b64enc }}
  {{- end }}
  # Redis 사용 시 (prod)
  {{- if .Values.redis.url }}
  REDIS_URL: {{ .Values.redis.url | b64enc }}
  {{- end }}
{{- end }}