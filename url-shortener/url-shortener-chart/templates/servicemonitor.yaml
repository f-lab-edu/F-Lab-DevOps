{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
    # Prometheus Operatorк∞А мЭі labelл°Ь ServiceMonitorл•Љ мД†нГЭ
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api   # url-shortener-svcмЭШ selectorмЩА мЭЉмєШ
  endpoints:
    - port: http                     # service.yamlмЭШ port nameк≥Љ мЭЉмєШ
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
