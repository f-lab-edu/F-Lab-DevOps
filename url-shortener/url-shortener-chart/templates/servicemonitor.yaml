{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
    # Prometheus Operatorк°Җ мқҙ labelлЎң ServiceMonitorлҘј м„ нғқ
    # kube-prometheus-stackмқҳ кё°ліё selectorмҷҖ мқјм№ҳн•ҙм•ј н•Ё
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api   # url-shortener-svcмқҳ selectorмҷҖ мқјм№ҳ
  endpoints:
    - port: http                     # service.yamlмқҳ port nameкіј мқјм№ҳ
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
