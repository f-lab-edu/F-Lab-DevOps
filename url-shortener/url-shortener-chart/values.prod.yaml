api:
  replicas: 2           # prod는 고가용성을 위해 2개
  image:
    tag: v1
    pullPolicy: IfNotPresent
  env:
    appEnv: production
    debug: 'false'      # prod는 디버그 비활성화

postgres:
  database: urldb
  # 민감정보는 values.prod-secret.yaml로 분리해서 사용하세요 (Git ignore 권장)
  password: ""
  databaseUrl: ""
  storage: 10Gi         # prod는 스토리지 넉넉하게

ingress:
  enabled: true
  host: url-shortener.example.com   # prod는 실제 도메인
