# ── API 설정 ──────────────────────────────────────────────
api:
  replicas: 2
  port: 8000
  image:
    repository: url-shortener-api
    tag: v1
    pullPolicy: Never
  env:
    appEnv: production
    debug: 'false'
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 20

# HPA가 CPU 메트릭을 사용하기 위함 -> 컨테이너에도 적용
  resources:
    requests:        # Kubernetes가 Pod를 노드에 배치할 때 보장하는 최소 자원
      cpu: 100m
      memory: 128Mi
    limits:          # Pod가 사용할 수 있는 최대 자원 (초과 시 제한)
      cpu: 500m
      memory: 512Mi # 초과 시 OOMKilled (강제 종료)

# ── PostgreSQL 설정 ────────────────────────────────────────
postgres:
  enabled: true # 개발 환경
  version: '15'
  user: postgres
  database: prod-db
  # 민감정보는 values-secret.yaml로 분리해서 사용하세요 (Git ignore 권장)
  password: ""
  databaseUrl: ""
  storage: 1Gi
  storageClass: standard

# ── Ingress 설정 ───────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: url-shortener.local
  pathType: Prefix
  annotations: {}

# ── HPA 설정 ───────────────────────────────────────────
hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 2
  targetCPUUtilizationPercentage: 50

# ── RDS 설정 (prod 전용) ────────────────────────────────────────
rds:
  writeUrl: ""    # prod: values.prod-secret.yaml로 주입
  readUrl: ""     # prod: values.prod-secret.yaml로 주입

# ── Redis 설정 ───────────────────────────────────────────
redis:
  enabled: false
  url: ""

# --- ServiceMonitor 설정 ────────────────────────────────────────
serviceMonitor:
  enabled: false
  interval: 10s